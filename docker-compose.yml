services:
  postgres:
    image: postgres:18.1-alpine
    container_name: api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set}
      POSTGRES_DB: ${PG_DB:-api_db}
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-network

  redis:
    image: redis:8-alpine
    container_name: api-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-network

  # Dev only — entferne aus Production-Compose.
  pgadmin:
    image: dpage/pgadmin4:9.10
    container_name: api-pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD must be set}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-80}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - api-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-server
    restart: unless-stopped
    # App-Konfiguration (TWITCH_*, JWT_SECRET, ADMIN_EMAILS, SECRETS_KEY …)
    # kommt aus der .env — sie liegt in .dockerignore, landet also nicht im
    # Image und muss zur Laufzeit injiziert werden. Die expliziten
    # `environment:`-Werte unten haben Vorrang vor env_file, daher zeigt
    # DATABASE_URL/REDIS_URL korrekt auf die Container-Hostnamen statt auf
    # das localhost aus der .env.
    env_file:
      - .env
    environment:
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD:?PG_PASSWORD must be set}@postgres:${PG_PORT:-5432}/${PG_DB:-api_db}
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - api-network

networks:
  api-network:
    driver: bridge
